<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play a Sentence | LingoArcade.com</title>
    <meta
      name="description"
      content="Spela Play a Sentence via LingoArcade.com."
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #241f1a;
        color: #fff7ef;
        font-family: Arial, sans-serif;
      }

      .frame-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 14px 18px;
        background: rgba(36, 31, 26, 0.92);
        border-bottom: 1px solid rgba(255, 247, 239, 0.12);
      }

      .brand,
      .launch-link {
        color: inherit;
        text-decoration: none;
      }

      .brand {
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-size: 0.92rem;
      }

      .launch-link {
        color: #ffd7b4;
        font-weight: 700;
      }

      iframe {
        width: 100%;
        height: calc(100vh - 58px);
        border: 0;
        display: block;
        background: #241f1a;
      }
    </style>
  </head>
  <body>
    <div class="frame-shell">
      <header class="topbar">
        <a class="brand" href="/">LingoArcade.com</a>
        <a class="launch-link" href="https://playasentence.vercel.app/"
          >Open standalone</a
        >
      </header>
      <iframe
        src="https://playasentence.vercel.app/"
        title="Play a Sentence"
        loading="eager"
        allow="fullscreen"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>
  </body>
</html>
